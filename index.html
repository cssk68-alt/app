<script>
const GROUPS = [
  { name:"USA", color:"#3B82F6", emoji:"🇺🇸", products:[
    { name:"iShares Core S&P 500 UCITS ETF (Acc)", amount:100, price:"675 €", ticker:"SXR8", isin:"IE00B5BMR087", trType:"etf", ticker_ref:"SXR8", details:[{n:"Nvidia",p:8.2},{n:"Apple",p:6.7},{n:"Microsoft",p:5.0}] }
  ]},
  { name:"Emerging Markets", color:"#10B981", emoji:"🌍", products:[
    { name:"iShares Core MSCI EM IMI UCITS ETF (Acc)", amount:70, price:"44 €", ticker:"EIMI", isin:"IE00BKM4GZ66", trType:"etf", ticker_ref:"EIMI", details:[{n:"China",p:28},{n:"Indien",p:20},{n:"Taiwan",p:18},{n:"Südkorea",p:11},{n:"Brasilien",p:5}] }
  ]}
];

const STORAGE_KEY = 'sparplan_currentTotal';
const DEFAULT_TOTAL = GROUPS.reduce((s,g)=>s+g.products.reduce((a,p)=>a+p.amount,0),0);
const total = DEFAULT_TOTAL;
const posCount = GROUPS.reduce((s,g)=>s+g.products.length,0);

GROUPS.forEach(g => {
  g.products.forEach(p => { p.pct = p.amount / total; });
  g.pct = g.products.reduce((a,p)=>a+p.pct,0);
});

let currentTotal = parseFloat(localStorage.getItem(STORAGE_KEY)) || DEFAULT_TOTAL;
let _geoData = null;

function getAmt(pct){ return Math.round(pct * currentTotal * 100) / 100; }
function fmtAmt(pct){ const v=getAmt(pct); return Number.isInteger(v)?v:v.toFixed(2); }

function updateHeader(){
  document.getElementById('hdrTotal').textContent = currentTotal + ' €';
  document.getElementById('hdrSub').textContent = (currentTotal*12) + ' € / Jahr · ' + posCount + ' Positionen';
}
updateHeader();

const svg = document.getElementById('piesvg');
const cx=130, cy=130, r=110, ri=72, gap=0.03;
const pieData = GROUPS.map(g=>({name:g.name, color:g.color, emoji:g.emoji, value:g.products.reduce((a,p)=>a+p.amount,0), pct: g.pct}));

function polarToXY(cx,cy,r,angle){ return [cx+r*Math.cos(angle), cy+r*Math.sin(angle)]; }
function describeArc(cx,cy,r,ri,startA,endA){
  const [x1,y1]=polarToXY(cx,cy,r,startA);
  const [x2,y2]=polarToXY(cx,cy,r,endA);
  const [x3,y3]=polarToXY(cx,cy,ri,endA);
  const [x4,y4]=polarToXY(cx,cy,ri,startA);
  const large=endA-startA>Math.PI?1:0;
  return `M${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} L${x3},${y3} A${ri},${ri},0,${large},0,${x4},${y4} Z`;
}

let startAngle = -Math.PI/2;
const paths = [];
pieData.forEach((d,i)=>{
  const slice = (d.value/total)*2*Math.PI - gap;
  const endAngle = startAngle + slice;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', describeArc(cx,cy,r,ri,startAngle,endAngle));
  path.setAttribute('fill', d.color);
  path.setAttribute('stroke','none');
  path.style.cursor='pointer';
  path.addEventListener('click',()=>openModal(i));
  svg.appendChild(path);
  paths.push(path);
  startAngle = endAngle + gap;
});

const pieCenter = document.getElementById('pieCenter');
pieCenter.innerHTML = `<div class="pie-center-emoji">💼</div><div class="pie-center-name" style="color:#a78bfa">Portfolio</div><div class="pie-center-val">${currentTotal} €/Mo</div>`;

function renderCards(){
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  GROUPS.forEach((g,i)=>{
    const gt = getAmt(g.pct);
    const pct = (g.pct*100).toFixed(1);
    const card = document.createElement('div');
    card.className='card';
    card.style.borderColor = g.color+'33';
    card.innerHTML = `<div class="card-top"><div class="card-left"><span class="card-emoji">${g.emoji}</span><span class="card-name" style="color:${g.color}">${g.name}</span></div><div class="card-right">${gt} €<span>${pct}%</span></div></div>`;
    card.addEventListener('click',()=>openModal(i));
    cardsEl.appendChild(card);
  });
}

renderCards();

// ← FIX 1: ASYNC openModal mit geo_weights.json
async function openModal(groupIndex){
  window._openModalIndex = groupIndex;
  const g = GROUPS[groupIndex];
  const gt = getAmt(g.pct);
  const pct = (g.pct*100);

  document.getElementById('mEmoji').textContent = g.emoji;
  document.getElementById('mName').style.color = g.color;
  document.getElementById('mName').textContent = g.name;
  document.getElementById('mSub').innerHTML = `<b>${gt} €</b> / Mo · <b>${Math.round(gt*12)} €</b> / Jahr`;
  document.getElementById('mSharePct').style.color = g.color;
  document.getElementById('mSharePct').textContent = pct.toFixed(1)+'%';
  document.getElementById('mShareFill').style.width = pct+'%';
  document.getElementById('mShareFill').style.background = g.color;
  document.getElementById('mShareNote').textContent = `von ${currentTotal} €/Monat gesamt`;

  const prod = document.getElementById('mProducts');
  prod.innerHTML = '';

  // ← Lade geo_weights.json
  try {
    if (!_geoData) {
      const resp = await fetch('./data/geo_weights.json?t=' + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      _geoData = await resp.json();
      console.log('✓ geo_weights.json geladen:', _geoData);
    }
  } catch (err) {
    console.warn('geo_weights.json konnte nicht geladen werden:', err);
    _geoData = null;
  }

  g.products.forEach(p => {
    const pAmt = getAmt(p.pct);
    const div = document.createElement('div');
    div.className = 'product-card';
    div.style.borderColor = g.color+'20';

    let detailsHTML = '';
    
    // ← Single Source of Truth: Nutze geo_weights.json
    if (p.ticker_ref && _geoData && _geoData.countries && Array.isArray(_geoData.countries)) {
      try {
        const countriesForProduct = _geoData.countries.filter(c => 
          c.via && Array.isArray(c.via) && c.via.includes(p.ticker_ref)
        );

        if (countriesForProduct.length > 0) {
          const productPortfolioWeight = _geoData._meta && _geoData._meta.portfolio_weights 
            ? _geoData._meta.portfolio_weights[p.ticker_ref] 
            : null;
          
          if (productPortfolioWeight && productPortfolioWeight > 0) {
            const rows = countriesForProduct.map(c => {
              try {
                const landPortfolioWeight = c.pct_gesamt / 100;
                const landInProductDecimal = landPortfolioWeight / productPortfolioWeight;
                const landInProductPct = landInProductDecimal * 100;
                const mo = (landInProductDecimal * pAmt).toFixed(2);
                const yr = (landInProductDecimal * pAmt * 12).toFixed(0);
                const barW = Math.min(landInProductPct, 100);

                return `<div class="detail-row"><div class="detail-top"><span class="detail-name">${c.flag || '🌐'} ${c.land}</span><span class="detail-pct" style="color:${g.color}">${landInProductPct.toFixed(1)}%</span></div><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${barW}%;background:${g.color}"></div></div><div class="detail-euros"><span>≈ <b>${mo} €</b>/Mo</span><span>≈ <b>${yr} €</b>/Jahr</span></div></div>`;
              } catch (e) {
                console.warn('Fehler bei Land-Berechnung:', c.land, e);
                return '';
              }
            }).filter(r => r).join('');

            if (rows) {
              detailsHTML = `<div class="details"><div class="details-label">✓ Länderverteilung (geo_weights.json)</div>${rows}</div>`;
            }
          }
        }
      } catch (err) {
        console.warn('Fehler beim Laden der Länder-Details:', err);
      }
    }

    // ← FALLBACK
    if (!detailsHTML && p.details && p.details.length) {
      const rows = p.details.map(d => {
        const mo = ((d.p/100)*pAmt).toFixed(2);
        const yr = ((d.p/100)*pAmt*12).toFixed(0);
        const barW = Math.min(d.p, 100);
        return `<div class="detail-row"><div class="detail-top"><span class="detail-name">${d.n}</span><span class="detail-pct" style="color:${g.color}">${d.p}%</span></div><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${barW}%;background:${g.color}"></div></div><div class="detail-euros"><span>≈ <b>${mo} €</b>/Mo</span><span>≈ <b>${yr} €</b>/Jahr</span></div></div>`;
      }).join('');
      detailsHTML = `<div class="details"><div class="details-label">Positionen / Gewichtung (Fallback)</div>${rows}</div>`;
    }

    div.innerHTML = `<div class="product-header" style="border-bottom-color:${g.color}15"><div class="product-title-row"><div class="product-name">${p.name}</div><div class="ticker-badge">${p.ticker}</div></div><div class="stats-row"><div class="stat"><div class="stat-label">Monatlich</div><div class="stat-val" style="color:${g.color}">${fmtAmt(p.pct)} €</div></div><div class="stat"><div class="stat-label">Jährlich</div><div class="stat-val">${Math.round(pAmt*12)} €</div></div></div></div>${detailsHTML}`;
    prod.appendChild(div);
  });

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
</script>
