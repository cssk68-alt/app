name: Update ETF Data (Geo + Holdings + Sectors + Performance)
on:
  schedule:
    - cron: '0 2 * * 0'       # Jeden Sonntag 02:00 UTC -> Geo / Holdings / Sektoren
    - cron: '30 17 * * 1-5'   # Mo-Fr 17:30 UTC -> Performance (nach EU-Marktschluss)
  workflow_dispatch:          # Manuell ueber GitHub UI triggerbar
  push:                       # Auto-Run bei Aenderungen an den Update-Scripts (Test/Trigger)
    branches: [main]
    paths:
      - 'update_performance.py'
      - 'update_weights.py'
      - 'update_holdings_sectors.py'
      - '.github/workflows/update_data.yml'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Update Geo Weights (Laender pro Portfolio)
        id: step_geo
        run: python update_weights.py
        continue-on-error: true

      - name: Update Holdings + Sectors (Top-Positionen + Sektor-Splits)
        id: step_holdings
        run: python update_holdings_sectors.py
        continue-on-error: true

      - name: Update Performance (Portfolio vs MSCI World)
        id: step_performance
        run: python update_performance.py
        continue-on-error: true

      - name: Zeige Update-Status
        if: always()
        run: |
          echo "update_weights.py:          ${{ steps.step_geo.outcome }}"
          echo "update_holdings_sectors.py: ${{ steps.step_holdings.outcome }}"
          echo "update_performance.py:      ${{ steps.step_performance.outcome }}"

      - name: Commit and Push changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/geo_weights.json data/holdings.json data/sectors.json data/performance.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update ETF data $(date +%Y-%m-%d)"
          git push

      # Bug 7 Fix: Workflow failt explizit wenn BEIDE Kern-Scripts (Geo+Holdings)
      # fehlschlagen. Performance-Fehler werden toleriert. Commit laeuft vorher,
      # damit Performance-Updates auch bei iShares-Ausfall gepusht werden.
      - name: Pruefe ob beide Kern-Scripts fehlgeschlagen sind
        if: steps.step_geo.outcome == 'failure' && steps.step_holdings.outcome == 'failure'
        run: |
          echo "::error::BEIDE Kern-Update-Scripts fehlgeschlagen - keine Geo/Holdings-Daten aktualisiert!"
          echo "  update_weights.py:          ${{ steps.step_geo.outcome }}"
          echo "  update_holdings_sectors.py: ${{ steps.step_holdings.outcome }}"
          echo "Moegliche Ursachen: iShares-API down, Netzwerkfehler, Parsing-Fehler."
          exit 1
